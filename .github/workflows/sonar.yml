name: SonarQube Cloud

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

permissions:
  contents: read

jobs:
  analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage report
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info
      - name: Convert LCOV to SonarQube generic coverage XML
        run: python3 .github/scripts/lcov_to_sonarqube.py
      - name: Get project version
        id: version
        run: echo "VERSION=$(grep '^version =' Cargo.toml | head -1 | cut -d'"' -f2)" >> $GITHUB_OUTPUT
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v8
        with:
          args: -Dsonar.projectVersion=${{ steps.version.outputs.VERSION }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # Unset RUSTFLAGS so the SonarQube Clippy sensor doesn't
          # interpret -D warnings as errors during its internal run.
          RUSTFLAGS: ''

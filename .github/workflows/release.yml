# Auto-generated release pipeline — builds binaries, publishes to crates.io,
# creates Homebrew formula, and drafts a GitHub Release.
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      tag: ${{ steps.plan.outputs.tag }}
    steps:
      - id: plan
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          echo 'matrix={"include":[{"target":"x86_64-unknown-linux-gnu","os":"ubuntu-latest"},{"target":"aarch64-unknown-linux-gnu","os":"ubuntu-latest"},{"target":"x86_64-apple-darwin","os":"macos-latest"},{"target":"aarch64-apple-darwin","os":"macos-latest"},{"target":"x86_64-pc-windows-msvc","os":"windows-latest"}]}' >> "$GITHUB_OUTPUT"

  build:
    needs: [plan]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          BINARY="sortcrab"
          if [[ "${{ matrix.target }}" == *-windows-* ]]; then BINARY="sortcrab.exe"; fi
          cd "target/${{ matrix.target }}/release"
          tar czf "../../../sortcrab-${{ matrix.target }}.tar.gz" "$BINARY"

      - name: Compute SHA256
        shell: bash
        run: |
          sha256sum "sortcrab-${{ matrix.target }}.tar.gz" | cut -d' ' -f1 > "sortcrab-${{ matrix.target }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sortcrab-${{ matrix.target }}
          path: |
            sortcrab-${{ matrix.target }}.tar.gz
            sortcrab-${{ matrix.target }}.sha256

  homebrew:
    needs: [plan, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate Homebrew formula
        shell: bash
        run: |
          VERSION="${{ needs.plan.outputs.tag }}"

          X86_64_DARWIN_SHA=$(cat artifacts/sortcrab-x86_64-apple-darwin/sortcrab-x86_64-apple-darwin.sha256)
          AARCH64_DARWIN_SHA=$(cat artifacts/sortcrab-aarch64-apple-darwin/sortcrab-aarch64-apple-darwin.sha256)
          X86_64_LINUX_SHA=$(cat artifacts/sortcrab-x86_64-unknown-linux-gnu/sortcrab-x86_64-unknown-linux-gnu.sha256)
          AARCH64_LINUX_SHA=$(cat artifacts/sortcrab-aarch64-unknown-linux-gnu/sortcrab-aarch64-unknown-linux-gnu.sha256)

          cat > sortcrab.rb << RUBYEOF
          class Sortcrab < Formula
            desc "File organizer CLI \u2014 sort your downloads into categorized folders"
            homepage "https://github.com/meyer-pidiache/sortcrab"
            version "${VERSION#v}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/meyer-pidiache/sortcrab/releases/download/${VERSION}/sortcrab-aarch64-apple-darwin.tar.gz"
                sha256 "${AARCH64_DARWIN_SHA}"
              else
                url "https://github.com/meyer-pidiache/sortcrab/releases/download/${VERSION}/sortcrab-x86_64-apple-darwin.tar.gz"
                sha256 "${X86_64_DARWIN_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/meyer-pidiache/sortcrab/releases/download/${VERSION}/sortcrab-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${AARCH64_LINUX_SHA}"
              else
                url "https://github.com/meyer-pidiache/sortcrab/releases/download/${VERSION}/sortcrab-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${X86_64_LINUX_SHA}"
              end
            end

            def install
              bin.install "sortcrab"
            end
          end
          RUBYEOF

      - uses: actions/upload-artifact@v4
        with:
          name: homebrew-formula
          path: sortcrab.rb

  publish:
    needs: [plan, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    needs: [plan, build, homebrew, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.plan.outputs.tag }}
          files: artifacts/**/*
          generate_release_notes: true
          draft: true

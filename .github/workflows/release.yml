# Release pipeline — triggered manually, reads version from Cargo.toml,
# builds binaries, publishes to crates.io, creates Homebrew formula,
# and drafts a GitHub Release.
name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v7

      - id: version
        name: Read version from Cargo.toml
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - id: plan
        run: |
          echo 'matrix={"include":[{"target":"x86_64-unknown-linux-gnu","os":"ubuntu-latest"},{"target":"aarch64-unknown-linux-gnu","os":"ubuntu-latest"},{"target":"x86_64-apple-darwin","os":"macos-latest"},{"target":"aarch64-apple-darwin","os":"macos-latest"},{"target":"x86_64-pc-windows-msvc","os":"windows-latest"}]}' >> "$GITHUB_OUTPUT"

  build:
    needs: [plan]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/setup-cross-toolchain-action@v1
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        with:
          target: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          BINARY="sortcrab"
          if [[ "${{ matrix.target }}" == *-windows-* ]]; then BINARY="sortcrab.exe"; fi
          cd "target/${{ matrix.target }}/release"
          tar czf "../../../sortcrab-${{ matrix.target }}.tar.gz" "$BINARY"

      - name: Compute SHA256
        shell: bash
        run: |
          sha256sum "sortcrab-${{ matrix.target }}.tar.gz" | cut -d' ' -f1 > "sortcrab-${{ matrix.target }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: sortcrab-${{ matrix.target }}
          path: |
            sortcrab-${{ matrix.target }}.tar.gz
            sortcrab-${{ matrix.target }}.sha256

  homebrew:
    needs: [plan, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate Homebrew formula
        shell: bash
        run: |
          VERSION="${{ needs.plan.outputs.tag }}"

          X86_64_DARWIN_SHA=$(cat artifacts/sortcrab-x86_64-apple-darwin/sortcrab-x86_64-apple-darwin.sha256)
          AARCH64_DARWIN_SHA=$(cat artifacts/sortcrab-aarch64-apple-darwin/sortcrab-aarch64-apple-darwin.sha256)
          X86_64_LINUX_SHA=$(cat artifacts/sortcrab-x86_64-unknown-linux-gnu/sortcrab-x86_64-unknown-linux-gnu.sha256)
          AARCH64_LINUX_SHA=$(cat artifacts/sortcrab-aarch64-unknown-linux-gnu/sortcrab-aarch64-unknown-linux-gnu.sha256)

          cat > sortcrab.rb << RUBYEOF
          class Sortcrab < Formula
            desc "File organizer CLI \u2014 sort your downloads into categorized folders"
            homepage "https://github.com/meyer-pidiache/sortcrab"
            version "${VERSION#v}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/meyer-pidiache/sortcrab/releases/download/${VERSION}/sortcrab-aarch64-apple-darwin.tar.gz"
                sha256 "${AARCH64_DARWIN_SHA}"
              else
                url "https://github.com/meyer-pidiache/sortcrab/releases/download/${VERSION}/sortcrab-x86_64-apple-darwin.tar.gz"
                sha256 "${X86_64_DARWIN_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/meyer-pidiache/sortcrab/releases/download/${VERSION}/sortcrab-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${AARCH64_LINUX_SHA}"
              else
                url "https://github.com/meyer-pidiache/sortcrab/releases/download/${VERSION}/sortcrab-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${X86_64_LINUX_SHA}"
              end
            end

            def install
              bin.install "sortcrab"
            end
          end
          RUBYEOF

      - uses: actions/upload-artifact@v7
        with:
          name: homebrew-formula
          path: sortcrab.rb

  publish:
    needs: [plan, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Check if version already published on crates.io
        run: |
          VERSION="${{ needs.plan.outputs.version }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/sortcrab/$VERSION")
          if [ "$STATUS" = "200" ]; then
            echo "Version $VERSION already published on crates.io — skipping publish"
            echo "skip_publish=true" >> "$GITHUB_ENV"
          else
            echo "skip_publish=false" >> "$GITHUB_ENV"
          fi

      - name: Publish to crates.io
        if: env.skip_publish != 'true'
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  tag:
    needs: [plan, build, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          TAG="${{ needs.plan.outputs.tag }}"
          if git fetch origin "refs/tags/$TAG" 2>/dev/null; then
            echo "Tag $TAG already exists — skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

  release:
    needs: [plan, build, homebrew, publish, tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.plan.outputs.tag }}
          files: artifacts/**/*
          generate_release_notes: true
          draft: true

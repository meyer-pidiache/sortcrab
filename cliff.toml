[changelog]
# changelog header
header = "# Changelog\n\nAll notable changes to this project will be documented in this file.\n"
# template for the changelog body
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endfor %}
"""
# template for the commit footer
footer = """
<!-- generated by git-cliff -->
"""
# remove the leading v from tag versions
trim = true

[git]
# parse conventional commits
conventional_commits = true
# filter out unconventional commits
filter_unconventional = true
# group commits by type
commit_parsers = [
    # Skip internal/fixup commits that aren't user-facing
    { message = "^fix\\(?.*\\)?:\\s*address PR review", skip = true },
    { message = "(?i)^docs?\\(?.*\\)?:\\s*regenerate.*changelog", skip = true },
    { message = "^chore\\(?.*\\)?:\\s*update Cargo\\.lock", skip = true },
    { message = "^chore\\(?.*\\)?:\\s*remove unused", skip = true },
    # Group remaining commits
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^doc", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^test", group = "Testing" },
    { message = "^ci", group = "CI/CD" },
    { message = "^chore", group = "Chores" },
    { message = "^style", group = "Style" },
]
# sort groups
filter_commits = true
# sort tags topologically
topo_order = true
